<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ты молодец!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400&display=swap');

        body {
            margin: 0;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .main-text {
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .sub-text {
            font-family: 'Roboto', sans-serif;
            font-size: 42px;
            color: #aaaaaa;
            margin: 30px 0 40px 0;
            text-align: center;
            font-weight: 400;
        }

        .emoji {
            font-size: 140px;
            margin-top: 20px;
            animation: kiss 2s infinite ease-in-out;
        }

        @keyframes kiss {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .main-text {
                font-size: 80px;
            }
            .sub-text {
                font-size: 32px;
            }
            .emoji {
                font-size: 100px;
            }
        }
    </style>
</head>
<body>

    <h1 class="main-text">ты молодец</h1>
    <p class="sub-text">ты лучше всех</p>
    <div class="emoji">😘</div>

</body>
</html>
